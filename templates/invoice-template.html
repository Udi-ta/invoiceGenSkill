<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Generator</title>
    <link rel="stylesheet" href="invoice-styles.css">
</head>
<body>
    <div class="container">
        <h1>📄 Invoice Generator</h1>
        
        <div class="info">
            <p><strong>Invoice ID:</strong> <span id="invoiceIdDisplay">-</span></p>
            <p><strong>Customer:</strong> <span id="customerDisplay">-</span></p>
            <p><strong>Total Amount:</strong> <span id="totalDisplay">-</span></p>
        </div>
        
        <canvas id="invoiceCanvas" width="900" height="1200"></canvas>
        
        <div class="button-group">
            <button onclick="downloadInvoice()">📥 Download Invoice</button>
        </div>
    </div>
    
    <script>
        // Invoice data will be injected here
        const invoiceData = {{INVOICE_DATA}};
        
        // Get canvas and context
        const canvas = document.getElementById('invoiceCanvas');
        const ctx = canvas.getContext('2d');
        
        // Modern minimalist color scheme
        const colors = {
            primary: '#2c3e50',
            secondary: '#95a5a6',
            border: '#e0e0e0',
            textPrimary: '#2c3e50',
            textSecondary: '#7f8c8d',
            white: '#ffffff',
            lightGray: '#f8f9fa',
            tableHeader: '#f5f5f5'
        };
        
        // Helper function to format currency
        function formatCurrency(amount) {
            return '₹' + amount.toLocaleString('en-IN', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }
        
        // Helper function to format date
        function formatDate(isoDate) {
            const date = new Date(isoDate);
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            return `${month}/${day}/${year}`;
        }
        
        // Draw invoice
        function drawInvoice() {
            // White background
            ctx.fillStyle = colors.white;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // INVOICE title (top left)
            ctx.fillStyle = colors.primary;
            ctx.font = 'bold 56px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('INVOICE', 80, 120);
            
            // Invoice details (top right)
            const rightX = canvas.width - 80;
            let rightY = 90;
            
            ctx.fillStyle = colors.textSecondary;
            ctx.font = '14px Arial';
            ctx.textAlign = 'right';
            ctx.fillText('INVOICE NUMBER', rightX, rightY);
            rightY += 25;
            ctx.fillStyle = colors.textPrimary;
            ctx.font = '16px Arial';
            ctx.fillText(invoiceData.invoiceId, rightX, rightY);
            
            rightY += 40;
            ctx.fillStyle = colors.textSecondary;
            ctx.font = '14px Arial';
            ctx.fillText('INVOICE DATE', rightX, rightY);
            rightY += 25;
            ctx.fillStyle = colors.textPrimary;
            ctx.font = '16px Arial';
            ctx.fillText(formatDate(invoiceData.generatedDate), rightX, rightY);
            
            rightY += 40;
            ctx.fillStyle = colors.textSecondary;
            ctx.font = '14px Arial';
            ctx.fillText('DUE DATE', rightX, rightY);
            rightY += 25;
            ctx.fillStyle = colors.textPrimary;
            ctx.font = '16px Arial';
            // Calculate due date (30 days from invoice date)
            const dueDate = new Date(invoiceData.generatedDate);
            dueDate.setDate(dueDate.getDate() + 30);
            ctx.fillText(formatDate(dueDate.toISOString()), rightX, rightY);
            
            // Horizontal line separator
            ctx.strokeStyle = colors.border;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(80, 260);
            ctx.lineTo(canvas.width - 80, 260);
            ctx.stroke();
            
            // FROM and BILL TO sections
            const sectionY = 310;
            
            // FROM section (left)
            ctx.fillStyle = colors.textSecondary;
            ctx.font = 'bold 12px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('FROM', 80, sectionY);
            
            ctx.fillStyle = colors.textPrimary;
            ctx.font = '14px Arial';
            ctx.fillText('Udita Enterprices Ltd', 80, sectionY + 30);
            ctx.fillText('Hypothetical colony', 80, sectionY + 55);
            ctx.fillText('Bangalore, India', 80, sectionY + 80);
            
            // BILL TO section (right)
            ctx.fillStyle = colors.textSecondary;
            ctx.font = 'bold 12px Arial';
            ctx.textAlign = 'right';
            ctx.fillText('BILL TO', rightX, sectionY);
            
            ctx.fillStyle = colors.textPrimary;
            ctx.font = '14px Arial';
            ctx.fillText(invoiceData.customer.name, rightX, sectionY + 30);
            ctx.fillText(invoiceData.customer.email, rightX, sectionY + 55);
            
            // Items table
            const tableY = 500;
            const tableX = 80;
            const tableWidth = canvas.width - 160;
            
            // Table header
            ctx.fillStyle = colors.tableHeader;
            ctx.fillRect(tableX, tableY, tableWidth, 45);
            
            // Header borders
            ctx.strokeStyle = colors.border;
            ctx.lineWidth = 1;
            ctx.strokeRect(tableX, tableY, tableWidth, 45);
            
            // Column widths
            const idWidth = 80;
            const descWidth = tableWidth - idWidth - 150 - 100 - 150; // ID, PRICE, QTY, TOTAL
            const priceWidth = 150;
            const qtyWidth = 100;
            const totalWidth = 150;
            
            // Vertical lines in header
            let colX = tableX + idWidth;
            ctx.beginPath();
            ctx.moveTo(colX, tableY);
            ctx.lineTo(colX, tableY + 45);
            ctx.stroke();
            
            colX += descWidth;
            ctx.beginPath();
            ctx.moveTo(colX, tableY);
            ctx.lineTo(colX, tableY + 45);
            ctx.stroke();
            
            colX += priceWidth;
            ctx.beginPath();
            ctx.moveTo(colX, tableY);
            ctx.lineTo(colX, tableY + 45);
            ctx.stroke();
            
            colX += qtyWidth;
            ctx.beginPath();
            ctx.moveTo(colX, tableY);
            ctx.lineTo(colX, tableY + 45);
            ctx.stroke();
            
            // Header text
            ctx.fillStyle = colors.textPrimary;
            ctx.font = 'bold 13px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('ID', tableX + 15, tableY + 28);
            ctx.fillText('DESCRIPTION', tableX + idWidth + 15, tableY + 28);
            ctx.textAlign = 'center';
            ctx.fillText('PRICE', tableX + idWidth + descWidth + priceWidth/2, tableY + 28);
            ctx.fillText('QTY', tableX + idWidth + descWidth + priceWidth + qtyWidth/2, tableY + 28);
            ctx.textAlign = 'right';
            ctx.fillText('TOTAL', tableX + tableWidth - 15, tableY + 28);
            
            // Table rows
            let currentY = tableY + 45;
            ctx.font = '13px Arial';
            ctx.fillStyle = colors.textPrimary;
            
            invoiceData.items.forEach((item, index) => {
                const rowHeight = 50;
                
                // Row background (alternating)
                if (index % 2 === 1) {
                    ctx.fillStyle = colors.lightGray;
                    ctx.fillRect(tableX, currentY, tableWidth, rowHeight);
                }
                
                // Row border
                ctx.strokeStyle = colors.border;
                ctx.strokeRect(tableX, currentY, tableWidth, rowHeight);
                
                // Vertical lines
                colX = tableX + idWidth;
                ctx.beginPath();
                ctx.moveTo(colX, currentY);
                ctx.lineTo(colX, currentY + rowHeight);
                ctx.stroke();
                
                colX += descWidth;
                ctx.beginPath();
                ctx.moveTo(colX, currentY);
                ctx.lineTo(colX, currentY + rowHeight);
                ctx.stroke();
                
                colX += priceWidth;
                ctx.beginPath();
                ctx.moveTo(colX, currentY);
                ctx.lineTo(colX, currentY + rowHeight);
                ctx.stroke();
                
                colX += qtyWidth;
                ctx.beginPath();
                ctx.moveTo(colX, currentY);
                ctx.lineTo(colX, currentY + rowHeight);
                ctx.stroke();
                
                // Row data
                ctx.fillStyle = colors.textPrimary;
                ctx.textAlign = 'left';
                ctx.fillText('#', tableX + 15, currentY + 30);
                ctx.fillText(item.productName, tableX + idWidth + 15, currentY + 30);
                ctx.textAlign = 'center';
                ctx.fillText(formatCurrency(item.unitPrice), tableX + idWidth + descWidth + priceWidth/2, currentY + 30);
                ctx.fillText(item.quantity.toString(), tableX + idWidth + descWidth + priceWidth + qtyWidth/2, currentY + 30);
                ctx.textAlign = 'right';
                ctx.fillText(formatCurrency(item.lineTotal), tableX + tableWidth - 15, currentY + 30);
                
                currentY += rowHeight;
            });
            
            // Add empty rows to match design
            const totalRows = 4;
            const emptyRows = totalRows - invoiceData.items.length;
            for (let i = 0; i < emptyRows; i++) {
                const rowHeight = 50;
                
                if ((invoiceData.items.length + i) % 2 === 1) {
                    ctx.fillStyle = colors.lightGray;
                    ctx.fillRect(tableX, currentY, tableWidth, rowHeight);
                }
                
                ctx.strokeStyle = colors.border;
                ctx.strokeRect(tableX, currentY, tableWidth, rowHeight);
                
                // Vertical lines
                colX = tableX + idWidth;
                ctx.beginPath();
                ctx.moveTo(colX, currentY);
                ctx.lineTo(colX, currentY + rowHeight);
                ctx.stroke();
                
                colX += descWidth;
                ctx.beginPath();
                ctx.moveTo(colX, currentY);
                ctx.lineTo(colX, currentY + rowHeight);
                ctx.stroke();
                
                colX += priceWidth;
                ctx.beginPath();
                ctx.moveTo(colX, currentY);
                ctx.lineTo(colX, currentY + rowHeight);
                ctx.stroke();
                
                colX += qtyWidth;
                ctx.beginPath();
                ctx.moveTo(colX, currentY);
                ctx.lineTo(colX, currentY + rowHeight);
                ctx.stroke();
                
                ctx.fillStyle = colors.textPrimary;
                ctx.textAlign = 'left';
                ctx.fillText('#', tableX + 15, currentY + 30);
                
                currentY += rowHeight;
            }
            
            // Totals section (right aligned)
            currentY += 40;
            const totalsX = canvas.width - 350;
            
            ctx.fillStyle = colors.textSecondary;
            ctx.font = '14px Arial';
            ctx.textAlign = 'left';
            
            // Subtotal
            ctx.fillText('SUBTOTAL', totalsX, currentY);
            ctx.textAlign = 'right';
            ctx.fillStyle = colors.textPrimary;
            ctx.fillText(formatCurrency(invoiceData.subtotal), rightX, currentY);
            currentY += 30;
            
            // Discount
            ctx.textAlign = 'left';
            ctx.fillStyle = colors.textSecondary;
            ctx.fillText(`DISCOUNT (${invoiceData.invoiceDiscountPercent}%)`, totalsX, currentY);
            ctx.textAlign = 'right';
            ctx.fillStyle = colors.textPrimary;
            ctx.fillText('-' + formatCurrency(invoiceData.invoiceDiscountAmount), rightX, currentY);
            currentY += 30;
            
            // Tax
            ctx.textAlign = 'left';
            ctx.fillStyle = colors.textSecondary;
            ctx.fillText(`TAX (${invoiceData.gstPercent}%)`, totalsX, currentY);
            ctx.textAlign = 'right';
            ctx.fillStyle = colors.textPrimary;
            ctx.fillText(formatCurrency(invoiceData.gstAmount), rightX, currentY);
            currentY += 50;
            
            // Invoice Total
            ctx.fillStyle = colors.primary;
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('Invoice Total', totalsX, currentY);
            ctx.textAlign = 'right';
            ctx.fillText(formatCurrency(invoiceData.totalAmount), rightX, currentY);
            
            // Update display info
            document.getElementById('invoiceIdDisplay').textContent = invoiceData.invoiceId;
            document.getElementById('customerDisplay').textContent = invoiceData.customer.name;
            document.getElementById('totalDisplay').textContent = formatCurrency(invoiceData.totalAmount);
        }
        
        // Download function
        function downloadInvoice() {
            const link = document.createElement('a');
            link.download = `invoice-${invoiceData.invoiceId}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
        
        // Draw invoice on page load
        window.onload = function() {
            drawInvoice();
        };
    </script>
</body>
</html>
