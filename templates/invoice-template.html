<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice</title>
    <link rel="stylesheet" href="invoice-styles.css">
</head>
<body>
    <div class="container">
        <h1>📄 Invoice 📄</h1>

        <div class="info">
            <p><strong>Invoice ID:</strong> <span id="invoiceIdDisplay">-</span></p>
            <p><strong>Customer:</strong> <span id="customerDisplay">-</span></p>
            <p><strong>Total Amount:</strong> <span id="totalDisplay">-</span></p>
        </div>

        <canvas id="invoiceCanvas" width="900" height="1200"></canvas>

        <div class="button-group">
            <button onclick="downloadInvoice()">📥 Download Invoice</button>
        </div>
    </div>

    <script>
        // Invoice data will be injected here
        const invoiceData = JSON.parse(`{{INVOICE_DATA}}`);

        // Get canvas and context
        const canvas = document.getElementById('invoiceCanvas');
        const ctx = canvas.getContext('2d');

        // Modern minimalist color scheme
        const colors = {
            primary: '#24364b',
            secondary: '#95a5a6',
            border: '#d9dee5',
            textPrimary: '#2c3e50',
            textSecondary: '#7f8c8d',
            white: '#ffffff',
            lightGray: '#f7f9fb',
            tableHeader: '#f3f5f7'
        };

        const defaultSeller = {
            name: 'Udita Enterprises Ltd',
            addressLine1: 'Hypothetical Colony',
            addressLine2: 'Bangalore, India',
            email: 'billing@uditaenterprises.com'
        };

        function getInvoiceNumber() {
            return invoiceData.invoiceId || `ORDER-${invoiceData.orderId || 'UNKNOWN'}`;
        }

        function getSeller() {
            return {
                ...defaultSeller,
                ...(invoiceData.seller || {})
            };
        }

        function getCurrencyConfig() {
            const currency = invoiceData.currency || 'USD';
            const locale = invoiceData.locale || (currency === 'INR' ? 'en-IN' : 'en-US');
            const symbolMap = {
                USD: '$',
                INR: '₹',
                EUR: '€',
                GBP: '£'
            };

            return {
                code: currency,
                locale,
                symbol: invoiceData.currencySymbol || symbolMap[currency] || '$'
            };
        }

        // Helper function to format currency
        function formatCurrency(amount) {
            const { locale, symbol } = getCurrencyConfig();
            return symbol + Number(amount || 0).toLocaleString(locale, {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }

        // Helper function to format date
        function formatDate(isoDate) {
            const date = new Date(isoDate);
            if (Number.isNaN(date.getTime())) {
                return '-';
            }

            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const year = date.getFullYear();
            return `${month}/${day}/${year}`;
        }

        function drawWrappedText(text, x, y, maxWidth, lineHeight, maxLines = 2) {
            const words = String(text || '').split(' ');
            const lines = [];
            let currentLine = '';

            words.forEach((word) => {
                const testLine = currentLine ? `${currentLine} ${word}` : word;
                const testWidth = ctx.measureText(testLine).width;

                if (testWidth > maxWidth && currentLine) {
                    lines.push(currentLine);
                    currentLine = word;
                } else {
                    currentLine = testLine;
                }
            });

            if (currentLine) {
                lines.push(currentLine);
            }

            const visibleLines = lines.slice(0, maxLines).map((line, index) => {
                if (index === maxLines - 1 && lines.length > maxLines) {
                    let trimmed = line;
                    while (ctx.measureText(`${trimmed}…`).width > maxWidth && trimmed.length > 0) {
                        trimmed = trimmed.slice(0, -1);
                    }
                    return `${trimmed}…`;
                }
                return line;
            });

            visibleLines.forEach((line, index) => {
                ctx.fillText(line, x, y + (index * lineHeight));
            });
        }

        // Draw invoice
        function drawInvoice() {
            const seller = getSeller();
            const invoiceNumber = getInvoiceNumber();

            // White background
            ctx.fillStyle = colors.white;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Header
            ctx.fillStyle = colors.primary;
            ctx.font = 'bold 56px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('INVOICE', 70, 95);

            const labelX = 610;
            const valueX = 830;
            let metaY = 60;

            ctx.font = 'bold 13px Arial';
            ctx.fillStyle = colors.textSecondary;
            ctx.textAlign = 'left';
            ctx.fillText('Invoice Number', labelX, metaY);
            ctx.fillStyle = colors.textPrimary;
            ctx.textAlign = 'right';
            ctx.font = '16px Arial';
            ctx.fillText(invoiceNumber, valueX, metaY);

            metaY += 38;
            ctx.textAlign = 'left';
            ctx.font = 'bold 13px Arial';
            ctx.fillStyle = colors.textSecondary;
            ctx.fillText('Date of Issue', labelX, metaY);
            ctx.textAlign = 'right';
            ctx.font = '16px Arial';
            ctx.fillStyle = colors.textPrimary;
            ctx.fillText(formatDate(invoiceData.generatedDate), valueX, metaY);

            metaY += 38;
            ctx.textAlign = 'left';
            ctx.font = 'bold 13px Arial';
            ctx.fillStyle = colors.textSecondary;
            ctx.fillText('Due Date', labelX, metaY);
            ctx.textAlign = 'right';
            ctx.font = '16px Arial';
            ctx.fillStyle = colors.textPrimary;
            const dueDate = new Date(invoiceData.generatedDate);
            dueDate.setDate(dueDate.getDate() + 30);
            ctx.fillText(formatDate(dueDate.toISOString()), valueX, metaY);

            // Divider
            ctx.strokeStyle = colors.border;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(70, 145);
            ctx.lineTo(830, 145);
            ctx.stroke();

            // From / Bill To
            const sectionTop = 205;
            const leftColX = 70;
            const rightColX = 830;

            ctx.textAlign = 'left';
            ctx.fillStyle = colors.textSecondary;
            ctx.font = 'bold 12px Arial';
            ctx.fillText('FROM', leftColX, sectionTop);

            ctx.fillStyle = colors.textPrimary;
            ctx.font = '14px Arial';
            ctx.fillText(seller.name, leftColX, sectionTop + 28);
            ctx.fillText(seller.addressLine1, leftColX, sectionTop + 50);
            ctx.fillText(seller.addressLine2, leftColX, sectionTop + 72);
            ctx.fillText(seller.email, leftColX, sectionTop + 94);

            ctx.textAlign = 'right';
            ctx.fillStyle = colors.textSecondary;
            ctx.font = 'bold 12px Arial';
            ctx.fillText('BILL TO', rightColX, sectionTop);

            ctx.fillStyle = colors.textPrimary;
            ctx.font = 'bold 14px Arial';
            ctx.fillText(invoiceData.customer?.name || '-', rightColX, sectionTop + 28);
            ctx.font = '14px Arial';
            ctx.fillText(invoiceData.customer?.email || '-', rightColX, sectionTop + 50);

            // Items table
            const tableX = 70;
            const tableY = 320;
            const tableWidth = 760;
            const headerHeight = 42;
            const rowHeight = 54;
            const totalRows = Math.max(5, (invoiceData.items || []).length);

            const colProduct = 360;
            const colQty = 90;
            const colRate = 135;
            const colAmount = 175;

            ctx.fillStyle = colors.tableHeader;
            ctx.fillRect(tableX, tableY, tableWidth, headerHeight);

            ctx.strokeStyle = colors.border;
            ctx.lineWidth = 1;
            ctx.strokeRect(tableX, tableY, tableWidth, headerHeight + (totalRows * rowHeight));

            const verticals = [
                tableX + colProduct,
                tableX + colProduct + colQty,
                tableX + colProduct + colQty + colRate
            ];

            verticals.forEach((x) => {
                ctx.beginPath();
                ctx.moveTo(x, tableY);
                ctx.lineTo(x, tableY + headerHeight + (totalRows * rowHeight));
                ctx.stroke();
            });

            ctx.beginPath();
            ctx.moveTo(tableX, tableY + headerHeight);
            ctx.lineTo(tableX + tableWidth, tableY + headerHeight);
            ctx.stroke();

            ctx.fillStyle = colors.textSecondary;
            ctx.font = 'bold 12px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('ITEM', tableX + 16, tableY + 26);
            ctx.fillText('QTY', tableX + colProduct + 16, tableY + 26);
            ctx.fillText('RATE', tableX + colProduct + colQty + 16, tableY + 26);
            ctx.fillText('AMOUNT', tableX + colProduct + colQty + colRate + 16, tableY + 26);

            for (let i = 0; i < totalRows; i++) {
                const rowY = tableY + headerHeight + (i * rowHeight);

                if (i % 2 === 1) {
                    ctx.fillStyle = colors.lightGray;
                    ctx.fillRect(tableX, rowY, tableWidth, rowHeight);
                }

                ctx.strokeStyle = colors.border;
                ctx.beginPath();
                ctx.moveTo(tableX, rowY);
                ctx.lineTo(tableX + tableWidth, rowY);
                ctx.stroke();

                const item = invoiceData.items?.[i];
                if (!item) {
                    continue;
                }

                ctx.fillStyle = colors.textPrimary;
                ctx.textAlign = 'left';
                ctx.font = '14px Arial';
                drawWrappedText(item.productName, tableX + 16, rowY + 22, colProduct - 32, 16, 2);

                ctx.textAlign = 'left';
                ctx.fillText(String(item.quantity ?? '-'), tableX + colProduct + 16, rowY + 30);

                ctx.textAlign = 'left';
                ctx.fillText(formatCurrency(item.unitPrice), tableX + colProduct + colQty + 16, rowY + 30);

                ctx.textAlign = 'left';
                ctx.fillText(formatCurrency(item.lineTotal), tableX + colProduct + colQty + colRate + 16, rowY + 30);
            }

            // Totals
            let totalsY = tableY + headerHeight + (totalRows * rowHeight) + 52;
            const totalsLabelX = 585;
            const totalsValueX = 830;

            ctx.font = '14px Arial';
            ctx.textAlign = 'left';
            ctx.fillStyle = colors.textSecondary;
            ctx.fillText('SUBTOTAL', totalsLabelX, totalsY);
            ctx.textAlign = 'right';
            ctx.fillStyle = colors.textPrimary;
            ctx.fillText(formatCurrency(invoiceData.subtotal), totalsValueX, totalsY);

            totalsY += 28;
            ctx.textAlign = 'left';
            ctx.fillStyle = colors.textSecondary;
            ctx.fillText(`DISCOUNT (${invoiceData.invoiceDiscountPercent || 0}%)`, totalsLabelX, totalsY);
            ctx.textAlign = 'right';
            ctx.fillStyle = colors.textPrimary;
            ctx.fillText(`-${formatCurrency(invoiceData.invoiceDiscountAmount)}`, totalsValueX, totalsY);

            totalsY += 28;
            ctx.textAlign = 'left';
            ctx.fillStyle = colors.textSecondary;
            ctx.fillText(`TAX (${invoiceData.gstPercent || 0}%)`, totalsLabelX, totalsY);
            ctx.textAlign = 'right';
            ctx.fillStyle = colors.textPrimary;
            ctx.fillText(formatCurrency(invoiceData.gstAmount), totalsValueX, totalsY);

            totalsY += 24;
            ctx.strokeStyle = colors.border;
            ctx.beginPath();
            ctx.moveTo(totalsLabelX, totalsY);
            ctx.lineTo(totalsValueX, totalsY);
            ctx.stroke();

            totalsY += 22;
            ctx.textAlign = 'left';
            ctx.fillStyle = colors.primary;
            ctx.font = 'bold 18px Arial';
            ctx.fillText('TOTAL', totalsLabelX, totalsY);
            ctx.textAlign = 'right';
            ctx.fillText(formatCurrency(invoiceData.totalAmount), totalsValueX, totalsY);

            // Update display info
            document.getElementById('invoiceIdDisplay').textContent = invoiceNumber;
            document.getElementById('customerDisplay').textContent = invoiceData.customer?.name || '-';
            document.getElementById('totalDisplay').textContent = formatCurrency(invoiceData.totalAmount);
        }

        // Download function
        function downloadInvoice() {
            const link = document.createElement('a');
            link.download = `invoice-${getInvoiceNumber()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // Draw invoice on page load
        window.onload = function() {
            drawInvoice();
        };
    </script>
</body>
</html>
